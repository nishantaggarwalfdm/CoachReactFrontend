# cloudbuild.yaml — FRONTEND (React + Nginx → Cloud Run)

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # optional

substitutions:
  _REGION: northamerica-northeast1
  _REPOSITORY: coach-frontend-repo
  _SERVICE: coach-frontend
  # Replace this AFTER backend first deploys
  _API_URL: "https://coach-backend-REPLACE-ME.northamerica-northeast1.run.app/api/v1/coach"
  _IMAGE: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

steps:
  - name: gcr.io/cloud-builders/npm
    args: ["ci"]

  - name: gcr.io/cloud-builders/npm
    env:
      - "REACT_APP_API_URL=${_API_URL}"
    args: ["run", "build"]

  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}:$SHORT_SHA", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}:$SHORT_SHA"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run","deploy","${_SERVICE}",
        "--image","${_IMAGE}:$SHORT_SHA",
        "--region","${_REGION}",
        "--platform","managed",
        "--allow-unauthenticated",
        "--port","80"
      ]

images:
  - "${_IMAGE}:$SHORT_SHA"